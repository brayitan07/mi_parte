{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Correo enviado - Educatec</title>
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        .reset-card {
            background: white; border-radius: 20px; padding: 48px 40px;
            max-width: 460px; width: 100%;
            box-shadow: 0 8px 40px rgba(0,0,0,0.10);
        }
        .icon-circle {
            width: 64px; height: 64px; border-radius: 50%;
            background: #d1fae5; display: flex; align-items: center;
            justify-content: center; margin: 0 auto 24px;
            font-size: 26px; color: #10b981;
        }
        .reset-card h3 { font-weight: 700; color: #081b3a; margin-bottom: 8px; }
        .reset-card p  { color: #6b7280; font-size: 14px; margin-bottom: 28px; }
        .back-link {
            display: inline-flex; align-items: center; gap: 8px;
            background: #006eff; color: #fff; border-radius: 10px;
            padding: 10px 24px; font-weight: 600; text-decoration: none;
            font-size: 14px; transition: background .15s;
        }
        .back-link:hover { background: #0055cc; color: #fff; }
        .tip { background: #f8fafc; border-radius: 10px; padding: 14px 16px;
               font-size: 13px; color: #6b7280; margin-bottom: 24px; }
        .tip i { color: #006eff; margin-right: 6px; }
    </style>
</head>
<body class="login-body">
<div class="container d-flex align-items-center justify-content-center min-vh-100 py-5">
    <div class="reset-card text-center">
        <div class="icon-circle">
            <i class="fas fa-envelope-open-text"></i>
        </div>
        <h3>Revisa tu correo</h3>
        <p>Si existe una cuenta con ese correo, recibirás un enlace para restablecer tu contraseña en los próximos minutos.</p>

        <div class="tip">
            <i class="fas fa-info-circle"></i>
            Revisa también tu carpeta de spam si no ves el correo.
        </div>

        <a href="{% url 'iniciar_sesion' %}" class="back-link">
            <i class="fas fa-arrow-left"></i> Volver al inicio de sesión
        </a>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
