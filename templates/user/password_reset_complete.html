{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contraseña actualizada - Educatec</title>
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        .reset-card {
            background: white; border-radius: 20px; padding: 48px 40px;
            max-width: 460px; width: 100%;
            box-shadow: 0 8px 40px rgba(0,0,0,0.10);
        }
        .icon-circle {
            width: 72px; height: 72px; border-radius: 50%;
            background: #d1fae5; display: flex; align-items: center;
            justify-content: center; margin: 0 auto 24px;
            font-size: 30px; color: #10b981;
        }
        .reset-card h3 { font-weight: 700; color: #081b3a; margin-bottom: 8px; }
        .reset-card p  { color: #6b7280; font-size: 14px; margin-bottom: 32px; }
        .btn-login {
            display: inline-flex; align-items: center; gap: 8px;
            background: #006eff; color: #fff; border-radius: 10px;
            padding: 12px 28px; font-weight: 700; text-decoration: none;
            font-size: 15px; box-shadow: 0 2px 8px rgba(0,110,255,.3);
            transition: background .15s, transform .1s;
        }
        .btn-login:hover { background: #0055cc; color: #fff; transform: translateY(-1px); }
    </style>
</head>
<body class="login-body">
<div class="container d-flex align-items-center justify-content-center min-vh-100 py-5">
    <div class="reset-card text-center">
        <div class="icon-circle">
            <i class="fas fa-shield-check"></i>
        </div>
        <h3>Contraseña actualizada</h3>
        <p>Tu contraseña fue cambiada correctamente. Ya puedes iniciar sesión con tu nueva contraseña.</p>

        <a href="{% url 'iniciar_sesion' %}" class="btn-login">
            <i class="fas fa-sign-in-alt"></i> Iniciar sesión
        </a>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
