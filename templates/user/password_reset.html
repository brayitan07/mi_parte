<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Recuperar contraseña</title>
</head>
<body>

    <h2>Recuperar contraseña</h2>

    <p>
        Ingresa el correo asociado a tu cuenta.
    </p>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit">
            Enviar enlace
        </button>
    </form>

</body>
</html>
