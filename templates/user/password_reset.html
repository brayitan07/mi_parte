{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar contraseña - Educatec</title>
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        .reset-card {
            background: white;
            border-radius: 20px;
            padding: 48px 40px;
            max-width: 460px;
            width: 100%;
            box-shadow: 0 8px 40px rgba(0,0,0,0.10);
        }
        .icon-circle {
            width: 64px; height: 64px; border-radius: 50%;
            background: #eff6ff; display: flex; align-items: center;
            justify-content: center; margin: 0 auto 24px;
            font-size: 26px; color: #006eff;
        }
        .reset-card h3 { font-weight: 700; color: #081b3a; margin-bottom: 8px; }
        .reset-card p  { color: #6b7280; font-size: 14px; margin-bottom: 28px; }
        .form-label    { font-size: 12px; font-weight: 600; color: #64748b;
                         text-transform: uppercase; letter-spacing: .04em; }
        .form-control  {
            border: 1.5px solid #e5e7eb; border-radius: 10px;
            background: #f8fafc; padding: 10px 14px; font-size: 14px;
        }
        .form-control:focus {
            border-color: #006eff; background: #fff;
            box-shadow: 0 0 0 3px rgba(0,110,255,.1);
        }
        .btn-primary-custom {
            background: #006eff; color: #fff; border: none;
            border-radius: 10px; padding: 12px; font-weight: 700;
            font-size: 15px; width: 100%;
            box-shadow: 0 2px 8px rgba(0,110,255,.3);
            transition: background .15s, transform .1s;
        }
        .btn-primary-custom:hover { background: #0055cc; transform: translateY(-1px); }
        .back-link { color: #6b7280; font-size: 13px; text-decoration: none; }
        .back-link:hover { color: #006eff; }
    </style>
</head>
<body class="login-body">
<div class="container d-flex align-items-center justify-content-center min-vh-100 py-5">
    <div class="reset-card text-center">
        <div class="icon-circle">
            <i class="fas fa-lock"></i>
        </div>
        <h3>Recuperar contraseña</h3>
        <p>Ingresa el correo asociado a tu cuenta y te enviaremos un enlace para restablecerla.</p>

        <form method="post" text-start>
            {% csrf_token %}
            <div class="mb-4 text-start">
                <label class="form-label">Correo electrónico</label>
                <input type="email" name="email" class="form-control" placeholder="tucorreo@ejemplo.com" required>
            </div>
            <button type="submit" class="btn-primary-custom mb-3">
                <i class="fas fa-paper-plane me-2"></i> Enviar enlace
            </button>
        </form>

        <a href="{% url 'iniciar_sesion' %}" class="back-link">
            <i class="fas fa-arrow-left me-1"></i> Volver al inicio de sesión
        </a>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
